name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Bootstrap
        run: ./scripts/bootstrap

      - name: Lint
        run: ./scripts/lint

      - name: Build
        run: ./scripts/build

      - name: Test
        run: ./scripts/test
